name: Build Electron App

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: 'npm'

      - name: Clean install dependencies
        shell: bash
        run: |
          # 删除可能损坏的依赖
          rm -rf node_modules package-lock.json
          # 重新安装（不使用 cache，确保完整安装）
          npm install
          # 确保原生模块被正确构建
          npm rebuild

      - name: Build app
        run: npm run make

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: out/make/
          retention-days: 7