name: Build Electron App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        node-version: [22]
      fail-fast: false  # 允许其他平台继续构建即使某个失败

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45  # 增加超时时间

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Display Node version
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
        shell: bash

      - name: Build app
        id: build
        run: |
          npm run make
          # 检查构建产物
          if [ -d "out/make" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "Build artifacts created successfully"
            ls -la out/make/
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "No build artifacts found"
            exit 1
          fi
        shell: bash

      - name: Build and sign app
        if: runner.os == 'macOS'
        run: |
          # 查找 .app
          APP_PATH=$(find out -name "*.app" -type d | head -1)
          APP_NAME=$(basename "$APP_PATH")

          echo "📦 Found: $APP_PATH"

          # 1. 修复权限
          echo "🔧 Fixing permissions..."
          chmod -R 755 "$APP_PATH"

          # 2. 移除 quarantine 属性（如果有）
          echo "🔧 Removing quarantine attributes..."
          xattr -d com.apple.quarantine "$APP_PATH" 2>/dev/null || true

          # 3. 执行 ad-hoc 签名
          echo "🔏 Signing with ad-hoc signature..."
          codesign --force --deep --sign - "$APP_PATH"

          # 4. 验证签名
          echo "✅ Verifying signature..."
          codesign --verify --verbose "$APP_PATH"

          echo "✅ Build complete!"

      - name: Upload artifacts for windows
        if: steps.build.outputs.status == 'success' && runner.os != 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: FastLauncher-${{ matrix.os }}
          path: out/make/
          retention-days: 14
          if-no-files-found: error  # 如果没有文件则报错

      - name: Upload artifacts for mac
        uses: actions/upload-artifact@v4
        if: steps.build.outputs.status == 'success' && runner.os == 'macOS'
        with:
          name: FastLauncher--${{ matrix.os }}
          path: out/FastLauncher-darwin-arm64
          retention-days: 14
          if-no-files-found: error  # 如果没有文件则报错
