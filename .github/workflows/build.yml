name: Build Electron App

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [22]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}  # 现在使用 20
          cache: 'npm'

      - name: Install dependencies
        shell: bash
        run: |
          # 不需要删除 node_modules，但确保版本正确
          node --version
          npm --version
          npm ci

      - name: Build app
        run: npm run make

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: out/make/
          retention-days: 7